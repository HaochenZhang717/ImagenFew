# training:
epochs: 1001
batch_size: 1024
learning_rate: 0.0001
weight_decay: 0.00001

# transform:
use_stft: false
delay: 10
embedding: 16

# model:
handler: models.ImagenTimeVectorCond.handler
img_resolution: 16
unet_channels: 32
ch_mult: [1,2,2,4]
attn_resolution: [8,4,2]
diffusion_steps: 36
ema: true
ema_warmup: 100
ft_method: all

# conditioning:
verbalts_context_suffix: qwen3_4b

# logging:
logging_iter: 100
tags: [vector-cond, qwen3]
run_dir: ImagenTimeVectorCond/VerbalTS_istanbul_traffic_qwen3/

# Data
datasets_dir: ./data/
seq_len: 144
pretrain: false
eval_split: train
datasets:
  - name: istanbul_traffic
    data: verbal_ts
    rel_path: VerbalTSDatasets/istanbul_traffic
train_on_datasets:
  - istanbul_traffic
