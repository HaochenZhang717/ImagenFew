# training:
epochs: 1001
batch_size: 64
learning_rate: 0.0001
weight_decay: 0.00001
# transform:
use_stft: false
delay: 8
embedding: 8
# model:
handler: models.ImagenTime.handler
img_resolution: 24
unet_channels: 32
ch_mult: [1,2,2,4]
attn_resolution: [8,4,2]
diffusion_steps: 36
ema: true
ema_warmup: 100
# logging:
logging_iter: 100
tags: []
run_dir: ImagenTime/VerbalTS_BlindWays/
# Data
datasets_dir: ./data/
seq_len: 600
pretrain: false
datasets:
  - name: BlindWays
    data: verbal_ts
    rel_path: VerbalTSDatasets/BlindWays
train_on_datasets:
  - BlindWays
