# training:
epochs: 1001
batch_size: 1024
learning_rate: 0.0001 #1e-4
weight_decay: 0.00001 #1e-5

# transform:
use_stft: false
delay: 8
embedding: 8

# model:
handler: models.ImagenFewCrossAttention.handler
model_ckpt: "/playpen-shared/haochenz/ImagenFew/logs/conditional_pretrain/da98bb2d-8b28-48ed-9713-cf99654039cd/ImagenFewCrossAttention.pt"
img_resolution: 8
unet_channels: 32
ch_mult: [1,2,2,4]
attn_resolution: [8,4,2]
diffusion_steps: 36
ema: true
ema_warmup: 100
ft_method: all

# conditioning:
pretrained_vae_weights: "/playpen-shared/haochenz/ImagenFew/logs/vae_pretrain/52131940-4465-42cb-85b4-93bd7f5ee944/MultiScaleVAE"
multi_scale_vae:
  z_channels: 64
  ch: 64
  ch_mult: [1, 2, 4]
  dynamic_size: 64
  dropout: 0.0

# logging:
logging_iter: 100
tags: [conditional-finetune, cross-attention]
run_dir: CondImagenFewFinetune/ETTh2/

# Data
datasets_dir: /playpen-shared/haochenz/ImagenFew/data/
seq_len: 24
pretrain: false
datasets:
  - name: ETTh2
    data: ETTh2
    embed: timeF
    rel_path: TSF/ETT-small/ETTh2.csv
    features: M
    label_len: 7
    pred_len: 0
train_on_datasets:
  - ETTh2
