# training:
epochs: 1001
batch_size: 256
learning_rate: 0.0001 #1e-4
weight_decay: 0.00001 #1e-5
# model:
handler: models.conditional_generator.handler
seq_len: 24
# conditioning:
cond_dim_in: 64          # = 3 * multi_scale_vae.z_channels (context from DualVAE)
cond_dim_out: 128          # must match diffusion.channels
#n_classes: 1
pretrain_path: ""         # optional path to pretrained unconditional VerbalTS weights
pretrained_vae_weights: "/work/vb21/haochen/neurips_2026/ImagenFew/logs/vae_pretrain/52131940-4465-42cb-85b4-93bd7f5ee944/MultiScaleVAE_Epoch330"  # path to pretrained DualVAE checkpoint (.pt)
#pretrained_vae_weights: ""
#sampler: ddim             # ddim | ddpm
# diffusion backbone:
diffusion:
  channels: 128
  n_scales: 3
  num_steps: 50
  beta_start: 0.0001
  beta_end: 0.5
  schedule: quad
  diffusion_embedding_dim: 128
  nheads: 8
  layers: 10
  multipatch_num: 3
  base_patch: 3
  L_patch_len: 2
  condition_type: adaLN     # add | cross_attention | adaLN
  n_stages: 5             # timestep stages in TextProjectorMVarMScaleMStep
  side:
    seq_len: 24
    var_emb: 16
    time_emb: 128
# multi-scale VAE (pretrained, frozen) — keys map to DualVAE.__init__ args:
multi_scale_vae:
  z_channels: 64
  ch: 64
  ch_mult: [1, 2, 4]
  dynamic_size: 64
  dropout: 0.0

# logging:
logging_iter: 100
tags: [self-conditional-generator]
run_dir: self_conditional_generator/pretrain/
# Data
datasets_dir: ./data/
pretrain: true
datasets:
  - name: stock
    data: stock
  - name: energy
    data: energy
  - name: ETTh1
    data: ETTh1
    embed: timeF
    rel_path: TSF/ETT-small/ETTh1.csv
    features: M
    label_len: 7
    pred_len: 0
  - name: Exchange
    data: custom
    embed: timeF
    rel_path: TSF/exchange_rate/exchange_rate.csv
    features: M
    label_len: 8
    pred_len: 0
  - name: MSL
    data: MSL
    rel_path: MSL
  - name: PSM
    data: PSM
    rel_path: PSM
  - name: SMAP
    data: SMAP
    rel_path: SMAP
  - name: SMD
    data: SMD
    rel_path: SMD
  - name: SelfRegulationSCP2
    data: UEA
    rel_path: UEA/SelfRegulationSCP2
  - name: UWaveGestureLibrary
    data: UEA
    rel_path: UEA/UWaveGestureLibrary
  - name: ECG5000
    data: UEA
    rel_path: UEA/ECG5000
  - name: NonInvasiveFetalECGThorax1
    data: UEA
    rel_path: UEA/NonInvasiveFetalECGThorax1
  - name: Blink
    data: UEA
    rel_path: UEA/Blink
  - name: ElectricDevices
    data: UEA
    rel_path: UEA/ElectricDevices
  - name: Trace
    data: UEA
    rel_path: UEA/Trace
  - name: FordB
    data: UEA
    rel_path: UEA/FordB
  - name: EMOPain
    data: UEA
