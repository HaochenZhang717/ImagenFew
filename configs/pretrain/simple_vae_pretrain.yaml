# training:
epochs: 1001
batch_size: 512
learning_rate: 0.0001
weight_decay: 0.00001
beta: 0.001

# model:
handler: models.multiscalevae.simple_handler
hidden_size: 128
num_layers: 4
num_heads: 4
latent_dim: 64
dynamic_size: [64, 64]

# logging:
logging_iter: 100
tags: []
run_dir: simple_vae_pretrain/

# data:
datasets_dir: ./data/
seq_len: 24
pretrain: true
datasets:
  - name: stock
    data: stock
  - name: energy
    data: energy
  - name: ETTh1
    data: ETTh1
    embed: timeF
    rel_path: TSF/ETT-small/ETTh1.csv
    features: M
    label_len: 7
    pred_len: 0
  - name: Exchange
    data: custom
    embed: timeF
    rel_path: TSF/exchange_rate/exchange_rate.csv
    features: M
    label_len: 8
    pred_len: 0
  - name: MSL
    data: MSL
    rel_path: MSL
  - name: PSM
    data: PSM
    rel_path: PSM
  - name: SMAP
    data: SMAP
    rel_path: SMAP
  - name: SMD
    data: SMD
    rel_path: SMD
  - name: SelfRegulationSCP2
    data: UEA
    rel_path: UEA/SelfRegulationSCP2
  - name: UWaveGestureLibrary
    data: UEA
    rel_path: UEA/UWaveGestureLibrary
  - name: ECG5000
    data: UEA
    rel_path: UEA/ECG5000
  - name: NonInvasiveFetalECGThorax1
    data: UEA
    rel_path: UEA/NonInvasiveFetalECGThorax1
  - name: Blink
    data: UEA
    rel_path: UEA/Blink
  - name: ElectricDevices
    data: UEA
    rel_path: UEA/ElectricDevices
  - name: Trace
    data: UEA
    rel_path: UEA/Trace
  - name: FordB
    data: UEA
    rel_path: UEA/FordB
  - name: EMOPain
    data: UEA
    rel_path: UEA/EMOPain
  - name: Chinatown
    data: UEA
    rel_path: UEA/Chinatown
  - name: SharePriceIncrease
    data: UEA
    rel_path: UEA/SharePriceIncrease
  - name: ETTh2
    data: ETTh2
    rel_path: TSF/ETT-small/ETTh2.csv
    features: M
    label_len: 7
    pred_len: 0
train_on_datasets:
  - stock
  - energy
  - ETTh1
  - Exchange
  - MSL
  - PSM
  - SMAP
  - SMD
  - SelfRegulationSCP2
  - UWaveGestureLibrary
  - ECG5000
  - NonInvasiveFetalECGThorax1
  - Blink
  - ElectricDevices
  - Trace
  - FordB
  - EMOPain
  - Chinatown
  - SharePriceIncrease

