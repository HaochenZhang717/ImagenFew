# training:
epochs: 1001
batch_size: 2048
learning_rate: 0.0001
weight_decay: 0.00001
beta: 0.001

# model:
handler: models.MultiScaleVAE.simple_handler
hidden_size: 128
num_layers: 4
num_heads: 4
latent_dim: 16
dynamic_size: [64, 64]
encoder_channels: [64, 96, 128, 128]
encoder_downsample_stages: 2
decoder_channels: [128, 128, 96, 64]
decoder_res_blocks: 2
decoder_dropout: 0.0
decoder_upsample_stages: 2

# logging:
logging_iter: 100
tags: []
run_dir: simple_vae_finetune/AirQuality/

# data:
datasets_dir: ./data/
seq_len: 24
pretrain: false
datasets:
  - name: stock
    data: stock
  - name: energy
    data: energy
  - name: ETTh1
    data: ETTh1
    embed: timeF
    rel_path: TSF/ETT-small/ETTh1.csv
    features: M
    label_len: 7
    pred_len: 0
  - name: Exchange
    data: custom
    embed: timeF
    rel_path: TSF/exchange_rate/exchange_rate.csv
    features: M
    label_len: 8
    pred_len: 0
  - name: MSL
    data: MSL
    rel_path: MSL
  - name: PSM
    data: PSM
    rel_path: PSM
  - name: SMAP
    data: SMAP
    rel_path: SMAP
  - name: SMD
    data: SMD
    rel_path: SMD
  - name: SelfRegulationSCP2
    data: UEA
    rel_path: UEA/SelfRegulationSCP2
  - name: UWaveGestureLibrary
    data: UEA
    rel_path: UEA/UWaveGestureLibrary
  - name: ECG5000
    data: UEA
    rel_path: UEA/ECG5000
  - name: NonInvasiveFetalECGThorax1
    data: UEA
    rel_path: UEA/NonInvasiveFetalECGThorax1
  - name: Blink
    data: UEA
    rel_path: UEA/Blink
  - name: ElectricDevices
    data: UEA
    rel_path: UEA/ElectricDevices
  - name: Trace
    data: UEA
    rel_path: UEA/Trace
  - name: FordB
    data: UEA
    rel_path: UEA/FordB
  - name: EMOPain
    data: UEA
    rel_path: UEA/EMOPain
  - name: Chinatown
    data: UEA
    rel_path: UEA/Chinatown
  - name: SharePriceIncrease
    data: UEA
    rel_path: UEA/SharePriceIncrease
  - name: AirQuality
    data: AirQuality
    path: TSG/AirQuality/AirQualityUCI.csv
train_on_datasets:
  - AirQuality
