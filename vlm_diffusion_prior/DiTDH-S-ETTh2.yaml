stage_2:
  target: stage2.models.DDT.DiTwDDTHeadRectangle
  params:
    input_size: [56, 32]
    patch_size: 1
    in_channels: 1152
    hidden_size: [384, 2048]
    depth: [12, 2]
    num_heads: [6, 16]
    mlp_ratio: 4.0
    class_dropout_prob: 0.1
    num_classes: 1
    use_qknorm: false
    use_swiglu: true
    use_rope: true
    use_rmsnorm: true
    wo_shift: false
    use_pos_embed: true

transport:
  params:
    path_type: "Linear"
    prediction: "velocity"
    loss_weight: null
    time_dist_type: "logit-normal_0_1"

sampler:
  mode: ODE
  params:
    sampling_method: "euler"
    num_steps: 50
    atol: 1.0e-6
    rtol: 1.0e-3
    reverse: false

guidance:
  method: "cfg"
  scale: 1.0
  t_min: 0.0
  t_max: 1.0

misc:
  latent_size: [1152, 56, 32]
  time_dist_shift_dim: 2064384
  time_dist_shift_base: 1152
  vlm_name: "Qwen/Qwen3-VL-8B-Instruct"

training:
  epochs: 1400
  global_batch_size: 128
  grad_accum_steps: 2
  ema_decay: 0.9995
  num_workers: 16
  log_interval: -1
  checkpoint_interval: 200
  sample_every: 10000
  clip_grad: 1.0
  global_seed: 42
  optimizer:
    lr: 2.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.0
  scheduler:
    type: linear
    warmup_epochs: 40
    decay_end_epoch: 800
    base_lr: 2.0e-4
    final_lr: 2.0e-5
    warmup_from_zero: false
